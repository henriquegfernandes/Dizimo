name: Release Build (Multi-Platform)

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Publish for Windows
        run: dotnet publish Dizimo/Dizimo.csproj -c Release -r win-x64 -o publish/win-x64 --self-contained true
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: dizimo-windows
          path: publish/win-x64

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Publish for Linux
        run: dotnet publish Dizimo/Dizimo.csproj -c Release -r linux-x64 -o publish/linux-x64 --self-contained true
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: dizimo-linux
          path: publish/linux-x64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Publish for macOS (Intel)
        run: dotnet publish Dizimo/Dizimo.csproj -c Release -r osx-x64 -o publish/osx-x64 --self-contained true
      - name: Publish for macOS (ARM64)
        run: dotnet publish Dizimo/Dizimo.csproj -c Release -r osx-arm64 -o publish/osx-arm64 --self-contained true
      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dizimo-macos-intel
          path: publish/osx-x64
      - name: Upload macOS ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: dizimo-macos-arm
          path: publish/osx-arm64

