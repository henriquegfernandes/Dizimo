name: Build MAUI App

on:
  push:
    paths:
      - 'Dizimo/**'
  pull_request:
    paths:
      - 'Dizimo/**'

jobs:
  quick-tests:
    name: Quick unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore test and core projects
        run: |
          echo "Listing repository layout for diagnostics"
          ls -la || true
          echo "Listing Dizimo/tests and Dizimo/src"
          ls -la Dizimo/tests || true
          ls -la Dizimo/src || true
          dotnet restore Dizimo/tests/Dizimo.Tests/Dizimo.Tests.csproj
          dotnet restore Dizimo/src/Dizimo.Core/Dizimo.Core.csproj

      - name: Run tests (fast)
        run: dotnet test Dizimo/tests/Dizimo.Tests/Dizimo.Tests.csproj -c Release

  # Note: macOS/iOS builds removed per request (we'll build Windows + Android only)

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export Android signing secrets to GITHUB_ENV
        run: |
          # Write repository secrets into GITHUB_ENV at runtime so they are available to later steps.
          # Empty secrets will result in empty variables; checks later will handle missing values.
          echo "Exporting Android signing secrets to GITHUB_ENV"
          echo "ANDROID_KEYSTORE=${{ secrets.ANDROID_KEYSTORE }}" >> $GITHUB_ENV || true
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV || true
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV || true
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV || true
        shell: bash

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Force .NET 10 SDK for this job (temporary global.json)
        shell: pwsh
        run: |
          Write-Host "Detected SDKs:";
          dotnet --list-sdks | ForEach-Object { Write-Host "  $_" }
          # Prefer an installed 10.x SDK on Windows (PowerShell friendly)
          $sdks = dotnet --list-sdks
          $sdk_ver = $sdks -split "\n" | Where-Object { $_ -match '^10\.' } | ForEach-Object { ($_ -split ' ')[0] } | Select-Object -First 1
          if (-not $sdk_ver) {
            Write-Host "No 10.x SDK detected, continuing with installed SDKs (dotnet --list-sdks above)"
          }
          else {
            Write-Host "Writing temporary global.json with SDK $sdk_ver"
            $json = '{"sdk":{"version":"' + $sdk_ver + '"}}'
            Set-Content -Path global.json -Value $json -Encoding UTF8
            Get-Content global.json
            Write-Host "Verifying dotnet now uses SDK $sdk_ver"
            dotnet --info
          }

      - name: Install MAUI workloads
        run: |
          dotnet workload install maui
          dotnet workload install android

      - name: "Diagnostics: dotnet SDKs & workloads"
        run: |
          echo "=== dotnet --list-sdks ==="
          dotnet --list-sdks || true
          echo "=== dotnet --list-runtimes ==="
          dotnet --list-runtimes || true
          echo "=== dotnet workload list ==="
          dotnet workload list || true

      - name: Restore libraries and tests (project-scoped)
        run: |
          dotnet restore src/Dizimo.Core/Dizimo.Core.csproj
          dotnet restore tools/validate/Validate.csproj
          dotnet restore tests/Dizimo.Tests/Dizimo.Tests.csproj

      - name: Build libraries
        run: |
          dotnet build src/Dizimo.Core/Dizimo.Core.csproj -c Release
          dotnet build tools/validate/Validate.csproj -c Release

      - name: Run unit tests
        run: |
          dotnet test tests/Dizimo.Tests/Dizimo.Tests.csproj -c Release --no-build --logger "trx;LogFileName=Dizimo.Tests.trx"

      - name: Publish test results
        uses: actions/upload-artifact@v4
        with:
          name: test-trx
          path: |
            tests/Dizimo.Tests/TestResults/Dizimo.Tests.trx

  # Optional: Android-specific job on Ubuntu (if you want a Linux runner for Android builds)
  build-android-linux:
    name: Build Android (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Force .NET 10 SDK for this job (temporary global.json)
        run: |
          echo "Detected SDKs:";
          dotnet --list-sdks || true
          # Prefer an installed 10.x SDK (explicit match). This avoids creating a global.json that pins
          # the job to an older SDK (which causes MSBuild to run from 8.x and mis-handle net10.0-android)
          sdk_ver=$(dotnet --list-sdks | awk '/^10\./{print $1; exit}') || true
          if [ -z "$sdk_ver" ]; then
            echo "No 10.x SDK detected. Listing available SDKs above. Aborting to make the failure explicit."
            exit 1
          fi
          echo "Writing temporary global.json with SDK $sdk_ver"
          printf '{"sdk":{"version":"%s"}}' "$sdk_ver" > global.json
          cat global.json
          echo "Verifying dotnet now uses SDK $sdk_ver"
          dotnet --info
      - name: Install workloads and Android SDK
        run: |
          sudo apt-get update && sudo apt-get install -y openjdk-11-jdk
          # On Linux runners we only install the Android workload; 'maui' workload isn't supported on Ubuntu hosted runners
          dotnet workload install android
      - name: Verify dotnet and workloads
        run: |
          echo "=== dotnet --info ==="
          dotnet --info
          echo
          echo "=== dotnet workload list ==="
          dotnet workload list || true
          echo
          # Wait for the android workload to appear (sometimes workload install takes a moment to register)
          found=1
          for i in 1 2 3; do
            if dotnet workload list | grep -iq "android"; then
              echo "Android workload is present"
              found=0
              break
            fi
            echo "Android workload not found yet (attempt $i/3), sleeping 5s..."
            sleep 5
          done
          if [ "$found" -ne 0 ]; then
            echo "Android workload still not found, attempting to install again"
            dotnet workload install android || true
            echo "Final workload list:"
            dotnet workload list || true
            if ! dotnet workload list | grep -iq "android"; then
              echo "ERROR: Android workload not available after retry"
              exit 1
            fi
          fi
      - name: Restore (with retries, target net10.0-android)
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Restore attempt $attempt/$max_attempts (targeting net10.0-android)"
            logfile="restore_attempt_${attempt}.log"
            # Avoid passing the framework token directly to restore; older SDKs/MSBuild can treat it as a positional
            # argument which results in MSB1008 (Only one project can be specified). Do a plain project-scoped restore
            # and let the SDK handle TFMs.
            # Use msbuild Restore target and set TargetFramework as a property to avoid passing the framework
            # as a separate token which some SDK/MSBuild combos treat as an extra project argument.
            if dotnet msbuild Dizimo/Dizimo.csproj -t:Restore -p:TargetFramework=net10.0-android -verbosity:detailed > "$logfile" 2>&1; then
              echo "Restore (msbuild) succeeded"
              break
            else
              echo "Restore failed; saving log to $logfile"
            fi
            attempt=$((attempt+1))
            if [ $attempt -le $max_attempts ]; then
              echo "Restore failed, sleeping 5s before retry..."
              sleep 5
            else
              echo "Restore failed after $max_attempts attempts"
              echo "=== dotnet --info ==="
              dotnet --info || true
              echo "=== dotnet workload list ==="
              dotnet workload list || true
              echo "=== ls Dizimo/*proj ==="
              ls -la Dizimo || true
              echo "Contents of last restore log:"
              tail -n +1 "$logfile" || true
              exit 1
            fi
          done

      - name: Upload restore logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-restore-logs
          path: |
            restore_attempt_*.log
      - name: Export Android signing secrets to GITHUB_ENV
        run: |
          echo "Exporting Android signing secrets to GITHUB_ENV"
          echo "ANDROID_KEYSTORE=${{ secrets.ANDROID_KEYSTORE }}" >> $GITHUB_ENV || true
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV || true
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV || true
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV || true
        shell: bash

      - name: Decode Android keystore (if provided)
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "$ANDROID_KEYSTORE" | base64 --decode > keystore.jks
            echo "Decoded keystore.jks"
          else
            echo "No ANDROID_KEYSTORE provided; skipping decode"
          fi

      - name: Build Android
        run: |
          if [ -f keystore.jks ]; then
            dotnet build Dizimo/Dizimo.csproj -f net10.0-android -c Release -p:AndroidKeyStore=true -p:AndroidSigningKeyStore=keystore.jks -p:AndroidSigningKeyAlias=$ANDROID_KEY_ALIAS -p:AndroidSigningKeyStorePassword=$ANDROID_KEYSTORE_PASSWORD -p:AndroidSigningKeyPassword=$ANDROID_KEY_PASSWORD
          else
            dotnet build Dizimo/Dizimo.csproj -f net10.0-android -c Release
          fi
      - name: Publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maui-android-artifacts
          path: Dizimo/bin/Release/net10.0-android

# Notes:
# - For signing/publishing (Android keystore, iOS provisioning, App Store operations) you must add repository secrets
#   (keystore files, passwords, Apple App Store Connect key, etc.). The PR will include instructions on which secrets to
#   add and how to create them.
