name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  # ============================================================================
  # EXTRACT VERSION - Extract version from .csproj for use in all jobs
  # ============================================================================
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Extract version from .csproj
        id: extract
        run: |
          # Extract ApplicationDisplayVersion from Dizimo.csproj
          VERSION=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' Dizimo/Dizimo.csproj | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

  # ============================================================================
  # BUILD & TEST - Runs on all platforms (x64 and ARM64)
  # ============================================================================
  build-and-test:
    name: Build & Test on ${{ matrix.os }} (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            rid: win-x64
            name: Windows (x64)
          - os: windows-latest
            rid: win-arm64
            name: Windows (ARM64)
          # Linux
          - os: ubuntu-latest
            rid: linux-x64
            name: Linux (x64)
          - os: ubuntu-latest
            rid: linux-arm64
            name: Linux (ARM64)
          # macOS
          - os: macos-latest
            rid: osx-x64
            name: macOS (Intel x64)
          - os: macos-latest
            rid: osx-arm64
            name: macOS (Apple Silicon ARM64)
    
    steps:
      - uses: actions/checkout@v6
    
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup NuGet cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.nuget/packages
            ~/.nuget/plugins-cache
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build library projects
        run: |
          dotnet build Dizimo.Domain/Dizimo.Domain.csproj --configuration Release --no-restore
          dotnet build Dizimo.Application/Dizimo.Application.csproj --configuration Release --no-restore
          dotnet build Dizimo.Infrastructure/Dizimo.Infrastructure.csproj --configuration Release --no-restore

      - name: Build Avalonia application for ${{ matrix.name }}
        run: dotnet build Dizimo/Dizimo.csproj --configuration Release --no-restore

      - name: Build test project (Windows x64 only)
        if: matrix.rid == 'win-x64'
        run: dotnet build Dizimo.Tests/Dizimo.Tests.csproj --configuration Release --no-restore

      - name: Run tests (Windows x64 only)
        if: matrix.rid == 'win-x64'
        run: dotnet test Dizimo.Tests/Dizimo.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
        continue-on-error: true
    
      - name: Upload test results (Windows x64 only)
        if: matrix.rid == 'win-x64' && always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-${{ matrix.rid }}
          path: '**/TestResults/**'
          retention-days: 7

      - name: Publish for ${{ matrix.name }}
        shell: bash
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ] || [ "${{ matrix.rid }}" = "win-arm64" ]; then
            dotnet publish Dizimo/Dizimo.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o "publish-${{ matrix.rid }}" -p:DebugType=Embedded -p:IncludeNativeLibrariesForSelfExtract=true
          else
            dotnet publish Dizimo/Dizimo.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o "publish-${{ matrix.rid }}"
          fi

      - name: Verify publish output
        shell: bash
        run: |
          if [ ! -d "publish-${{ matrix.rid }}" ]; then
            echo "❌ Publish output missing for ${{ matrix.rid }}"
            exit 1
          fi
          echo "✅ Publish output verified for ${{ matrix.rid }}"
          ls -lh publish-${{ matrix.rid }}/Dizimo.exe 2>/dev/null || ls -lh publish-${{ matrix.rid }}/Dizimo

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: dizimo-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}
          retention-days: 30

  # ============================================================================
  # CODE QUALITY - Runs on all branches
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
    
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Analyze code
        run: |
          echo "Checking for build warnings..."
          dotnet build Dizimo.Domain/Dizimo.Domain.csproj -c Release /p:TreatWarningsAsErrors=true || true
          dotnet build Dizimo.Application/Dizimo.Application.csproj -c Release /p:TreatWarningsAsErrors=true || true
          dotnet build Dizimo.Infrastructure/Dizimo.Infrastructure.csproj -c Release /p:TreatWarningsAsErrors=true || true
          dotnet build Dizimo/Dizimo.csproj -c Release /p:TreatWarningsAsErrors=true || true

      - name: Check for secrets
        # Only run on pull requests where BASE and HEAD are different
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
        continue-on-error: true

  # ============================================================================
  # BUILD WINDOWS INSTALLER - Only for x64 and ARM64
  # ============================================================================
  build-windows-installer:
    name: Build Windows Installer (${{ matrix.arch }})
    runs-on: windows-latest
    needs: [build-and-test, extract-version]
    strategy:
      matrix:
        include:
          - rid: win-x64
            arch: x64
          - rid: win-arm64
            arch: ARM64
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download artifact for ${{ matrix.arch }}
        uses: actions/download-artifact@v5
        with:
          name: dizimo-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}

      - name: Verify Executable Type (WinExe)
        run: |
          $exePath = "publish-${{ matrix.rid }}\Dizimo.exe"
          if (-not (Test-Path $exePath)) { exit 1 }
          [byte[]]$bytes = [System.IO.File]::ReadAllBytes($exePath)
          if ($bytes.Length -lt 64 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) { exit 1 }
          $peOffset = [System.BitConverter]::ToInt32($bytes, 0x3C)
          $subsystemOffset = $peOffset + 68
          $subsystem = [System.BitConverter]::ToInt16($bytes, $subsystemOffset)
          if ($subsystem -ne 3) {
            $bytes[$subsystemOffset] = 0x03
            $bytes[$subsystemOffset + 1] = 0x00
            [System.IO.File]::WriteAllBytes($exePath, $bytes)
          }

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Prepare Files for Installer
        run: |
          New-Item -ItemType Directory -Path "$env:TEMP\dizimo-app" -Force | Out-Null
          New-Item -ItemType Directory -Path "$env:TEMP\dizimo-resources" -Force | Out-Null
          Copy-Item "publish-${{ matrix.rid }}\*" "$env:TEMP\dizimo-app\" -Recurse -Force
          Copy-Item "Dizimo\Resources\AppIcon\appicon.ico" "$env:TEMP\dizimo-resources\appicon.ico" -Force

      - name: Verify staged installer files
        run: |
          $appDir = Join-Path $env:TEMP "dizimo-app"
          $iconPath = Join-Path $env:TEMP "dizimo-resources\appicon.ico"
          if (-not (Test-Path $appDir) -or -not (Get-ChildItem $appDir -Recurse -ErrorAction SilentlyContinue) -or -not (Test-Path $iconPath)) { exit 1 }

      - name: Build Inno Setup Installer
        run: |
          $issFile = "build-scripts\Dizimo.iss"
          $issContent = Get-Content $issFile -Raw
          $issContent = $issContent -replace '#define AppVersion ".*?"', "#define AppVersion `"${{ needs.extract-version.outputs.version }}`""
          $issContent = $issContent -replace 'OutputBaseFilename=Dizimo-Setup', "OutputBaseFilename=Dizimo-v${{ needs.extract-version.outputs.version }}-windows-${{ matrix.arch }}-Setup"
          $issContent = $issContent -replace 'ArchitecturesAllowed=x64', "ArchitecturesAllowed=${{ matrix.arch == 'x64' && 'x64' || 'arm64' }}"
          $issContent | Out-File -Encoding ASCII "Dizimo-Build.iss"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Dizimo-Build.iss"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Import Code Signing Certificate (Windows)
        if: env.WINDOWS_CODE_SIGNING_CERTIFICATE != ''
        run: |
          # Decode Base64 certificate
          $certBase64 = $env:WINDOWS_CODE_SIGNING_CERTIFICATE
          $certBytes = [System.Convert]::FromBase64String($certBase64)
          $certPath = Join-Path -Path $env:TEMP -ChildPath "dizimo-codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          
          # Import certificate to store
          Write-Host "🔐 Importing code signing certificate..."
          $securePassword = ConvertTo-SecureString -String $env:CODE_SIGNING_CERT_PASSWORD -AsPlainText -Force
          $importedCert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          Write-Host "✅ Imported certificate thumbprint: $($importedCert.Thumbprint)"
          
          # Store path for next step
          Write-Host "CERT_PATH=$certPath" >> $env:GITHUB_ENV
        env:
          WINDOWS_CODE_SIGNING_CERTIFICATE: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE }}
          CODE_SIGNING_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CERTIFICATE_PASSWORD }}

      - name: Sign Windows Installer
        if: env.WINDOWS_CODE_SIGNING_CERTIFICATE != ''
        run: |
          $installerPath = "Dizimo-v${{ needs.extract-version.outputs.version }}-windows-${{ matrix.arch }}-Setup.exe"
          $certPath = $env:CERT_PATH
          $password = $env:CODE_SIGNING_CERT_PASSWORD
          
          Write-Host "🔐 Signing installer with code signing certificate..."
          
          # Get thumbprint of imported certificate
          $cert = Get-ChildItem -Path Cert:\CurrentUser\My | Where-Object { $_.Subject -like "*Dizimo*" } | Select-Object -First 1
          if ($null -eq $cert) {
              Write-Host "⚠️  No Dizimo certificate found, continuing without signing..."
              exit 0
          }
          
          Write-Host "   Using certificate: $($cert.Thumbprint)"
          Write-Host "   Signing: $installerPath"
          
          # Sign with SignTool
          $signTool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          if (-not (Test-Path $signTool)) {
              $signTool = "signtool.exe"
          }
          
          & $signTool sign /f $certPath /p $password /d "Dizimo - Church Financial Management System" /t http://timestamp.digicert.com /tr http://timestamp.digicert.com /td sha256 /fd sha256 $installerPath 2>&1
          
          if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ Installer signed successfully"
          } else {
              Write-Host "⚠️  Signing failed, but continuing..."
          }
        env:
          CODE_SIGNING_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CERTIFICATE_PASSWORD }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v5
        with:
          name: dizimo-windows-${{ matrix.arch }}-installer
          path: Dizimo-v${{ needs.extract-version.outputs.version }}-windows-${{ matrix.arch }}-Setup.exe
          retention-days: 30

  # ============================================================================
  # BUILD LINUX APPIMAGE
  # ============================================================================
  build-linux-appimage:
    name: Build Linux AppImage (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [build-and-test, extract-version]
    strategy:
      matrix:
        include:
          - rid: linux-x64
            arch: x86_64
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download artifact for ${{ matrix.arch }}
        uses: actions/download-artifact@v5
        with:
          name: dizimo-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}

      - name: Download and setup AppImage tools
        run: |
          ARCH="${{ matrix.arch }}"
          if [ "$ARCH" = "x86_64" ]; then URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          elif [ "$ARCH" = "aarch64" ]; then URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage"
          else echo "Unsupported arch: $ARCH"; exit 1; fi
          curl -fSL "$URL" -o appimagetool && chmod +x appimagetool
          [ $(stat -c%s appimagetool) -gt 1000000 ] || exit 1
          sudo apt-get update -y && sudo apt-get install -y libfuse2 || true

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          mkdir -p AppDir/usr/lib
          
          cp -r publish-${{ matrix.rid }}/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/Dizimo
          
          # Copy centralized icon file
          if [ -f "Dizimo/Resources/AppIcon/appicon.ico" ]; then
            cp Dizimo/Resources/AppIcon/appicon.ico AppDir/usr/share/icons/hicolor/256x256/apps/dizimo.ico
            cp Dizimo/Resources/AppIcon/appicon.ico AppDir/usr/share/icons/hicolor/512x512/apps/dizimo.ico
            echo "✅ Icon copied from centralized location"
          else
            echo "⚠️  Warning: Icon not found, will generate placeholder"
          fi
          
          # Create desktop entry at AppDir root for appimagetool compatibility
          cat > AppDir/Dizimo.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Dizimo
          Exec=Dizimo
          Icon=Dizimo
          Categories=Utility;
          Terminal=false
          EOF
          
          # Also keep a copy in the standard location
          install -D AppDir/Dizimo.desktop AppDir/usr/share/applications/Dizimo.desktop
          
          # Create AppRun script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/Dizimo" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          # Generate icon from centralized file or use placeholder as fallback
          if [ -f "Dizimo/Resources/AppIcon/appicon.ico" ]; then
            cp Dizimo/Resources/AppIcon/appicon.ico AppDir/Dizimo.png 2>/dev/null || {
              sudo apt-get update
              sudo apt-get install -y imagemagick || true
              convert -size 256x256 xc:lightgray -gravity center -pointsize 32 -annotate 0 "D" AppDir/Dizimo.png || true
            }
          else
            sudo apt-get update
            sudo apt-get install -y imagemagick || true
            convert -size 256x256 xc:lightgray -gravity center -pointsize 32 -annotate 0 "D" AppDir/Dizimo.png || true
          fi
          
          ./appimagetool AppDir "Dizimo-v${{ needs.extract-version.outputs.version }}-linux-${{ matrix.arch }}.AppImage" || exit 1

      - name: Create AppImage Checksums
        run: |
          APPIMAGE_FILE="Dizimo-v${{ needs.extract-version.outputs.version }}-linux-${{ matrix.arch }}.AppImage"
          sha256sum "$APPIMAGE_FILE" > "${APPIMAGE_FILE}.sha256"

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v5
        with:
          name: dizimo-linux-${{ matrix.arch }}-appimage
          path: Dizimo-v${{ needs.extract-version.outputs.version }}-linux-${{ matrix.arch }}.AppImage*
          retention-days: 30

  # ============================================================================
  # BUILD MACOS DMG - For both x64 and ARM64
  # ============================================================================
  build-macos-dmg:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    needs: [build-and-test, extract-version]
    strategy:
      matrix:
        include:
          - rid: osx-x64
            arch: x86_64
          - rid: osx-arm64
            arch: arm64
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download artifact for ${{ matrix.arch }}
        uses: actions/download-artifact@v5
        with:
          name: dizimo-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}

      - name: Create macOS App Bundle and DMG
        run: |
          mkdir -p Dizimo.app/Contents/MacOS Dizimo.app/Contents/Resources
          cp -r publish-${{ matrix.rid }}/* Dizimo.app/Contents/MacOS/
          chmod +x Dizimo.app/Contents/MacOS/Dizimo
          [ -f "Dizimo/Resources/AppIcon/appicon.ico" ] && cp Dizimo/Resources/AppIcon/appicon.ico Dizimo.app/Contents/Resources/AppIcon.ico

          # Create Info.plist
          cat > Dizimo.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Dizimo</string>
              <key>CFBundleIdentifier</key>
              <string>com.henriquefernandestech.dizimo</string>
              <key>CFBundleName</key>
              <string>Dizimo</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ needs.extract-version.outputs.version }}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

          # Setup paths
          APP_NAME="Dizimo.app"
          DMG_NAME="Dizimo-v${{ needs.extract-version.outputs.version }}-macos-${{ matrix.arch }}.dmg"
          STAGE_DIR="$PWD/dmg-stage"

          rm -rf "$STAGE_DIR" "$DMG_NAME"
          mkdir -p "$STAGE_DIR"

          trap 'rm -rf "$STAGE_DIR"' EXIT

          # Stage files in isolated temp directory
          cp -R "$APP_NAME" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"
          sync
          sleep 2
          hdiutil create -volname "Dizimo" -srcfolder "$STAGE_DIR" -ov -format UDZO "$DMG_NAME" || { echo "Failed to create DMG"; exit 1; }


      - name: Setup Code Signing Certificate (macOS)
        if: env.MACOS_CODE_SIGNING_CERTIFICATE != ''
        run: |
          set -euo pipefail
          
          # Decode Base64 certificate
          CERT_BASE64="${{ secrets.MACOS_CODE_SIGNING_CERTIFICATE }}"
          CERT_PATH="${HOME}/dizimo-macos-codesign.p12"
          
          echo "🔐 Importing macOS code signing certificate..."
          echo "$CERT_BASE64" | base64 -d > "$CERT_PATH"
          
          # Import into keychain
          security import "$CERT_PATH" \
              -k ~/Library/Keychains/login.keychain \
              -P "${{ secrets.CODE_SIGNING_CERTIFICATE_PASSWORD }}" \
              -T /usr/bin/codesign \
              2>/dev/null || true
          
          # Allow codesign to use the key without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" ~/Library/Keychains/login.keychain 2>/dev/null || true
          
          echo "MACOS_CERT_PATH=$CERT_PATH" >> $GITHUB_ENV
          echo "✅ Certificate imported"

      - name: Sign macOS App Bundle
        if: env.MACOS_CODE_SIGNING_CERTIFICATE != ''
        run: |
          set -euo pipefail
          
          echo "🔐 Signing macOS app bundle..."
          
          # Get certificate identity
          CERT_IDENTITY=$(security find-identity -v -p codesigning ~/Library/Keychains/login.keychain | grep "Dizimo" | head -1 | sed -E 's/^[[:space:]]*[0-9]+[[:space:]]*([A-F0-9]+)[[:space:]]*"(.+)".*$/\2/' || echo "Developer ID Application")
          
          echo "   Using certificate: $CERT_IDENTITY"
          
          # Sign frameworks and dependencies
          if [ -d "Dizimo.app/Contents/Frameworks" ]; then
              echo "   Signing frameworks..."
              find "Dizimo.app/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.framework" \) | while read -r framework; do
                  codesign --force --verbose \
                      --sign "$CERT_IDENTITY" \
                      --timestamp \
                      "$framework" 2>/dev/null || true
              done
          fi
          
          # Sign the main bundle
          echo "   Signing main bundle..."
          codesign --force --verbose \
              --sign "$CERT_IDENTITY" \
              --timestamp \
              "Dizimo.app"
          
          # Verify
          echo "✅ Verifying signature..."
          codesign --verify --verbose "Dizimo.app"
          
          echo "✨ App bundle signed successfully"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v5
        with:
          name: dizimo-macos-${{ matrix.arch }}-dmg
          path: Dizimo-v${{ needs.extract-version.outputs.version }}-macos-${{ matrix.arch }}.dmg
          retention-days: 30

  # ============================================================================
  # CREATE RELEASE - Only on main branch, after all builds pass
  # ============================================================================
  create-release:
    name: Create GitHub Release
    needs: [build-and-test, code-quality, build-windows-installer, build-linux-appimage, build-macos-dmg, extract-version]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '<ApplicationDisplayVersion>\K[^<]+' Dizimo/Dizimo.csproj | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Organize release files
        run: |
          mkdir -p release
          cd artifacts
          
          # ZIP files (build artifacts)
          for dir in dizimo-*; do
            if [ -d "$dir" ] && [[ "$dir" != *"-installer" ]] && [[ "$dir" != *"-appimage" ]] && [[ "$dir" != *"-dmg" ]]; then
              zip -r "../release/${dir}.zip" "$dir" || true
            fi
          done
          
          # Installers and AppImages
          find . -name "*.exe" -exec cp {} ../release/ \; 2>/dev/null || true
          find . -name "*.AppImage" -exec cp {} ../release/ \; 2>/dev/null || true
          find . -name "*.dmg" -exec cp {} ../release/ \; 2>/dev/null || true
          
          ls -lh ../release/

      - name: Create GitHub Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Dizimo v${{ steps.version.outputs.version }}
          body: |
            ## Dizimo v${{ steps.version.outputs.version }}
            
            ### 📦 Release artifacts
            
            Multi-platform builds are available:
            
            **Windows**
            - Windows x64 - Setup.exe (Recommended for easy installation)
            - Windows x64 - ZIP (For portable/manual installation)
            - Windows ARM64 - Setup.exe (For ARM-based Windows devices)
            - Windows ARM64 - ZIP
            
            **Linux**
            - Linux x64 - AppImage (Runs on any Linux distribution)
            - Linux x64 - ZIP (For manual installation)
            - Linux ARM64 - AppImage (For ARM-based Linux devices)
            - Linux ARM64 - ZIP
            
            **macOS**
            - macOS Intel x64 - DMG (Recommended - drag and drop installer)
            - macOS Apple Silicon ARM64 - DMG (For M1/M2/M3 Macs)
            
            ### 🚀 Installation Instructions
            
            **Windows**: Download the Setup.exe and follow the installer wizard
            
            **Linux**: Download the AppImage, mark as executable, and run:
            ```bash
            chmod +x Dizimo-*.AppImage
            ./Dizimo-*.AppImage
            ```
            
            **macOS**: Download the DMG, open it, drag Dizimo.app to Applications folder
            
            ### 📝 Changelog
            
            Please see commit history for detailed changes.
            
            ---
            
            **Auto-generated release from CI/CD pipeline**
          draft: false
          prerelease: false
          artifacts: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
