name: CI - Testes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Dizimo.Tests/Dizimo.Tests.csproj

      - name: Build tests
        run: dotnet build Dizimo.Tests/Dizimo.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Dizimo.Tests/Dizimo.Tests.csproj --no-build --configuration Release --logger trx
