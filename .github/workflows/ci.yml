name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  # ============================================================================
  # EXTRACT VERSION - Extract version from .csproj for use in all jobs
  # ============================================================================
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Extract version from .csproj
        id: extract
        run: |
          # Extract ApplicationDisplayVersion from Dizimo.csproj
          VERSION=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' Dizimo/Dizimo.csproj | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

  # ============================================================================
  # BUILD & TEST - Runs on all platforms (x64 and ARM64)
  # ============================================================================
  build-and-test:
    name: Build & Test on ${{ matrix.os }} (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            rid: win-x64
            name: Windows (x64)
          - os: windows-latest
            rid: win-arm64
            name: Windows (ARM64)
          # Linux
          - os: ubuntu-latest
            rid: linux-x64
            name: Linux (x64)
          - os: ubuntu-latest
            rid: linux-arm64
            name: Linux (ARM64)
          # macOS
          - os: macos-latest
            rid: osx-x64
            name: macOS (Intel x64)
          - os: macos-latest
            rid: osx-arm64
            name: macOS (Apple Silicon ARM64)
    
    steps:
      - uses: actions/checkout@v5
    
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup NuGet cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.nuget/packages
            ~/.nuget/plugins-cache
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build library projects
        run: |
          dotnet build Dizimo.Domain/Dizimo.Domain.csproj --configuration Release --no-restore
          dotnet build Dizimo.Application/Dizimo.Application.csproj --configuration Release --no-restore
          dotnet build Dizimo.Infrastructure/Dizimo.Infrastructure.csproj --configuration Release --no-restore

      - name: Build Avalonia application for ${{ matrix.name }}
        run: dotnet build Dizimo/Dizimo.csproj --configuration Release --no-restore

      - name: Build test project (Windows x64 only)
        if: matrix.rid == 'win-x64'
        run: dotnet build Dizimo.Tests/Dizimo.Tests.csproj --configuration Release --no-restore

      - name: Run tests (Windows x64 only)
        if: matrix.rid == 'win-x64'
        run: dotnet test Dizimo.Tests/Dizimo.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
        continue-on-error: true
    
      - name: Upload test results (Windows x64 only)
        if: matrix.rid == 'win-x64' && always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-${{ matrix.rid }}
          path: '**/TestResults/**'
          retention-days: 7

      - name: Publish for ${{ matrix.name }}
        shell: bash
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ] || [ "${{ matrix.rid }}" = "win-arm64" ]; then
            dotnet publish Dizimo/Dizimo.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o "publish-${{ matrix.rid }}" -p:DebugType=Embedded -p:IncludeNativeLibrariesForSelfExtract=true
          else
            dotnet publish Dizimo/Dizimo.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o "publish-${{ matrix.rid }}"
          fi

      - name: Verify publish output
        shell: bash
        run: |
          if [ ! -d "publish-${{ matrix.rid }}" ]; then
            echo "❌ Publish output missing for ${{ matrix.rid }}"
            exit 1
          fi
          echo "✅ Publish output verified for ${{ matrix.rid }}"
          ls -lh publish-${{ matrix.rid }}/Dizimo.exe 2>/dev/null || ls -lh publish-${{ matrix.rid }}/Dizimo

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: dizimo-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}
          retention-days: 30

  # ============================================================================
  # CODE QUALITY - Runs on all branches
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
    
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Analyze code
        run: |
          echo "Checking for build warnings..."
          dotnet build Dizimo.Domain/Dizimo.Domain.csproj -c Release /p:TreatWarningsAsErrors=true || true
          dotnet build Dizimo.Application/Dizimo.Application.csproj -c Release /p:TreatWarningsAsErrors=true || true
          dotnet build Dizimo.Infrastructure/Dizimo.Infrastructure.csproj -c Release /p:TreatWarningsAsErrors=true || true
          dotnet build Dizimo/Dizimo.csproj -c Release /p:TreatWarningsAsErrors=true || true

      - name: Check for secrets
        # Only run on pull requests where BASE and HEAD are different
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
        continue-on-error: true

  # ============================================================================
  # BUILD WINDOWS INSTALLER - Only for x64 and ARM64
  # ============================================================================
  build-windows-installer:
    name: Build Windows Installer (${{ matrix.arch }})
    runs-on: windows-latest
    needs: [build-and-test, extract-version]
    strategy:
      matrix:
        include:
          - rid: win-x64
            arch: x64
          - rid: win-arm64
            arch: ARM64
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Download artifact for ${{ matrix.arch }}
        uses: actions/download-artifact@v5
        with:
          name: dizimo-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create installer directory and copy icon
        run: |
          mkdir -p installer
          copy-item publish-${{ matrix.rid }}\* installer\ -Recurse
          # Copy icon from centralized location
          copy-item Dizimo\Resources\AppIcon\appicon.ico installer\appicon.ico
          Write-Host "✅ Icon copied to installer directory"

      - name: Build NSIS installer
        run: |
          $nsiScript = @"
          !include "MUI2.nsh"
          !include "x64.nsh"
          Name "Dizimo"
          OutFile "Dizimo-v${{ needs.extract-version.outputs.version }}-windows-${{ matrix.arch }}-Setup.exe"
          InstallDir "`$PROGRAMFILES\Dizimo"
          RequestExecutionLevel admin
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "installer\*.*"
            CreateDirectory "`$SMPROGRAMS\Dizimo"
            ; Create shortcuts with icon
            CreateShortcut "`$SMPROGRAMS\Dizimo\Dizimo.lnk" "`$INSTDIR\Dizimo.exe" "" "`$INSTDIR\appicon.ico" 0
            CreateShortcut "`$DESKTOP\Dizimo.lnk" "`$INSTDIR\Dizimo.exe" "" "`$INSTDIR\appicon.ico" 0
            CreateShortcut "`$SMPROGRAMS\Dizimo\Uninstall.lnk" "`$INSTDIR\Uninstall.exe"
            WriteUninstaller "`$INSTDIR\Uninstall.exe"
            ; Register uninstall info
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Dizimo" "DisplayName" "Dizimo"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Dizimo" "DisplayIcon" "`$INSTDIR\appicon.ico"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Dizimo" "UninstallString" "`$INSTDIR\Uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Dizimo" "InstallLocation" "`$INSTDIR"
          SectionEnd
          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            RMDir /r "`$SMPROGRAMS\Dizimo"
            Delete "`$DESKTOP\Dizimo.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Dizimo"
          SectionEnd
          "@
          $nsiScript | Out-File -Encoding ASCII "installer.nsi"
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v5
        with:
          name: dizimo-windows-${{ matrix.arch }}-installer
          path: Dizimo-v${{ needs.extract-version.outputs.version }}-windows-${{ matrix.arch }}-Setup.exe
          retention-days: 30

  # ============================================================================
  # BUILD LINUX APPIMAGE - Only for x86_64
  # ============================================================================
  # Note: ARM64 AppImage is not built in CI because ubuntu-latest is x86_64 only.
  # ARM64 binaries are available as ZIP artifacts from build-and-test job.
  # To build ARM64 AppImage in CI, add a self-hosted ARM64 runner to the matrix.
  build-linux-appimage:
    name: Build Linux AppImage (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [build-and-test, extract-version]
    strategy:
      matrix:
        include:
          - rid: linux-x64
            arch: x86_64
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Download artifact for ${{ matrix.arch }}
        uses: actions/download-artifact@v5
        with:
          name: dizimo-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}

      - name: Download and setup AppImage tools
        run: |
          set -euo pipefail

          ARCH="${{ matrix.arch }}"

          # Use a reliable appimagetool source (continuous builds include aarch64)
          if [ "$ARCH" = "x86_64" ]; then
            URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          elif [ "$ARCH" = "aarch64" ]; then
            URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage"
          else
            echo "Unsupported arch: $ARCH"
            exit 1
          fi

          # Fail on HTTP errors; follow redirects
          curl -fSL "$URL" -o appimagetool
          chmod +x appimagetool

          # Sanity check (prevents the 9-byte 'Not Found' situation)
          test -s appimagetool
          FILE_SIZE=$(stat -c%s appimagetool)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "Downloaded appimagetool is unexpectedly small ($FILE_SIZE bytes). Likely a bad URL or HTTP error page."
            head -n 5 appimagetool || true
            exit 1
          fi

          echo "AppImage tools downloaded successfully (size: $FILE_SIZE bytes)"
          
          # Install runtime dependencies
          sudo apt-get update
          sudo apt-get install -y libfuse2 || true

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          mkdir -p AppDir/usr/lib
          
          cp -r publish-${{ matrix.rid }}/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/Dizimo
          
          # Copy centralized icon file
          if [ -f "Dizimo/Resources/AppIcon/appicon.ico" ]; then
            cp Dizimo/Resources/AppIcon/appicon.ico AppDir/usr/share/icons/hicolor/256x256/apps/dizimo.ico
            cp Dizimo/Resources/AppIcon/appicon.ico AppDir/usr/share/icons/hicolor/512x512/apps/dizimo.ico
            echo "✅ Icon copied from centralized location"
          else
            echo "⚠️  Warning: Icon not found, will generate placeholder"
          fi
          
          # Create desktop entry at AppDir root for appimagetool compatibility
          cat > AppDir/Dizimo.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Dizimo
          Exec=Dizimo
          Icon=Dizimo
          Categories=Utility;
          Terminal=false
          EOF
          
          # Also keep a copy in the standard location
          install -D AppDir/Dizimo.desktop AppDir/usr/share/applications/Dizimo.desktop
          
          # Create AppRun script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/Dizimo" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          # Generate icon from centralized file or use placeholder as fallback
          if [ -f "Dizimo/Resources/AppIcon/appicon.ico" ]; then
            # Try to use the ICO file directly
            cp Dizimo/Resources/AppIcon/appicon.ico AppDir/Dizimo.png 2>/dev/null || {
              echo "⚠️  Could not copy ICO as PNG, generating placeholder..."
              sudo apt-get update
              sudo apt-get install -y imagemagick || true
              convert -size 256x256 xc:lightgray -gravity center -pointsize 32 -annotate 0 "D" AppDir/Dizimo.png || true
            }
          else
            echo "Generating placeholder icon..."
            sudo apt-get update
            sudo apt-get install -y imagemagick || true
            convert -size 256x256 xc:lightgray -gravity center -pointsize 32 -annotate 0 "D" AppDir/Dizimo.png || true
          fi
          
          # Diagnostics
          echo "=== AppImage tools diagnostics ==="
          ./appimagetool --version || true
          file appimagetool || true
          echo "=== AppDir structure ==="
          ls -laR AppDir/ | head -50
          
          # Create AppImage
          echo "=== Creating AppImage ==="
          ./appimagetool AppDir "Dizimo-v${{ needs.extract-version.outputs.version }}-linux-${{ matrix.arch }}.AppImage" || {
            echo "appimagetool failed, check logs above"
            exit 1
          }
          
          echo "=== AppImage created successfully ==="
          ls -lh Dizimo-v${{ needs.extract-version.outputs.version }}-linux-${{ matrix.arch }}.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v5
        with:
          name: dizimo-linux-${{ matrix.arch }}-appimage
          path: Dizimo-v${{ needs.extract-version.outputs.version }}-linux-${{ matrix.arch }}.AppImage
          retention-days: 30

  # ============================================================================
  # BUILD MACOS DMG - For both x64 and ARM64
  # ============================================================================
  build-macos-dmg:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    needs: [build-and-test, extract-version]
    strategy:
      matrix:
        include:
          - rid: osx-x64
            arch: x86_64
          - rid: osx-arm64
            arch: arm64
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Download artifact for ${{ matrix.arch }}
        uses: actions/download-artifact@v5
        with:
          name: dizimo-${{ matrix.rid }}
          path: publish-${{ matrix.rid }}

      - name: Create macOS App Bundle and DMG
        run: |
          set -euo pipefail

          # Create app bundle structure
          mkdir -p Dizimo.app/Contents/MacOS
          mkdir -p Dizimo.app/Contents/Resources

          # Copy application files
          cp -r publish-${{ matrix.rid }}/* Dizimo.app/Contents/MacOS/
          chmod +x Dizimo.app/Contents/MacOS/Dizimo

          # Copy centralized icon file
          if [ -f "Dizimo/Resources/AppIcon/appicon.ico" ]; then
            cp Dizimo/Resources/AppIcon/appicon.ico Dizimo.app/Contents/Resources/AppIcon.ico
            echo "✅ Icon copied from centralized location"
          else
            echo "⚠️  Warning: Icon not found"
          fi

          # Create Info.plist
          cat > Dizimo.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Dizimo</string>
              <key>CFBundleIdentifier</key>
              <string>com.henriquefernandestech.dizimo</string>
              <key>CFBundleName</key>
              <string>Dizimo</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ needs.extract-version.outputs.version }}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

          # Setup paths
          APP_NAME="Dizimo.app"
          DMG_NAME="Dizimo-v${{ needs.extract-version.outputs.version }}-macos-${{ matrix.arch }}.dmg"
          STAGE_DIR="$(mktemp -d)"

          rm -f "$DMG_NAME"

          # Stage files in isolated temp directory
          cp -R "$APP_NAME" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"

          echo "Building DMG from staging directory: $STAGE_DIR"
          ls -la "$STAGE_DIR"

          # Create compressed DMG image using hdiutil create
          echo "Creating compressed DMG image..."
          hdiutil create \
            -volname "Dizimo" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DMG_NAME" || {
              echo "Failed to create DMG"
              exit 1
            }

          rm -rf "$STAGE_DIR"

          echo "DMG creation completed successfully"
          ls -lh "$DMG_NAME"
          hdiutil verify "$DMG_NAME" || echo "Warning: Could not verify DMG, but file was created"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v5
        with:
          name: dizimo-macos-${{ matrix.arch }}-dmg
          path: Dizimo-v${{ needs.extract-version.outputs.version }}-macos-${{ matrix.arch }}.dmg
          retention-days: 30

  # ============================================================================
  # CREATE RELEASE - Only on main branch, after all builds pass
  # ============================================================================
  create-release:
    name: Create GitHub Release
    needs: [build-and-test, code-quality, build-windows-installer, build-linux-appimage, build-macos-dmg, extract-version]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '<ApplicationDisplayVersion>\K[^<]+' Dizimo/Dizimo.csproj | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Organize release files
        run: |
          mkdir -p release
          cd artifacts
          
          # ZIP files (build artifacts)
          for dir in dizimo-*; do
            if [ -d "$dir" ] && [[ "$dir" != *"-installer" ]] && [[ "$dir" != *"-appimage" ]] && [[ "$dir" != *"-dmg" ]]; then
              zip -r "../release/${dir}.zip" "$dir" || true
            fi
          done
          
          # Installers and AppImages
          find . -name "*.exe" -exec cp {} ../release/ \; 2>/dev/null || true
          find . -name "*.AppImage" -exec cp {} ../release/ \; 2>/dev/null || true
          find . -name "*.dmg" -exec cp {} ../release/ \; 2>/dev/null || true
          
          ls -lh ../release/

      - name: Create GitHub Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Dizimo v${{ steps.version.outputs.version }}
          body: |
            ## Dizimo v${{ steps.version.outputs.version }}
            
            ### 📦 Release artifacts
            
            Multi-platform builds are available:
            
            **Windows**
            - Windows x64 - Setup.exe (Recommended for easy installation)
            - Windows x64 - ZIP (For portable/manual installation)
            - Windows ARM64 - Setup.exe (For ARM-based Windows devices)
            - Windows ARM64 - ZIP
            
            **Linux**
            - Linux x64 - AppImage (Runs on any Linux distribution)
            - Linux x64 - ZIP (For manual installation)
            - Linux ARM64 - AppImage (For ARM-based Linux devices)
            - Linux ARM64 - ZIP
            
            **macOS**
            - macOS Intel x64 - DMG (Recommended - drag and drop installer)
            - macOS Apple Silicon ARM64 - DMG (For M1/M2/M3 Macs)
            
            ### 🚀 Installation Instructions
            
            **Windows**: Download the Setup.exe and follow the installer wizard
            
            **Linux**: Download the AppImage, mark as executable, and run:
            ```bash
            chmod +x Dizimo-*.AppImage
            ./Dizimo-*.AppImage
            ```
            
            **macOS**: Download the DMG, open it, drag Dizimo.app to Applications folder
            
            ### 📝 Changelog
            
            Please see commit history for detailed changes.
            
            ---
            
            **Auto-generated release from CI/CD pipeline**
          draft: false
          prerelease: false
          artifacts: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
