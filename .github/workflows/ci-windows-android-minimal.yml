name: CI - Windows + Android (minimal)

on:
  push:
    paths:
      - 'Dizimo/**'
  pull_request:
    paths:
      - 'Dizimo/**'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows - build & test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pin SDK to 10.0.100
        shell: pwsh
        run: |
          $json = '{"sdk":{"version":"10.0.100"}}'
          Set-Content -Path global.json -Value $json -Encoding UTF8
          Write-Host "Wrote global.json:"; Get-Content global.json
          dotnet --info || true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.USERPROFILE }}\\.nuget\\packages
          key: nuget-windows-${{ hashFiles('**/*.csproj') }}

      - name: Restore projects
        run: |
          dotnet restore Dizimo/src/Dizimo.Core/Dizimo.Core.csproj
          dotnet restore Dizimo/tests/Dizimo.Tests/Dizimo.Tests.csproj

      - name: Build libraries
        run: dotnet build Dizimo/src/Dizimo.Core/Dizimo.Core.csproj -c Release -v:detailed

      - name: Build and run tests
        run: |
          dotnet build Dizimo/tests/Dizimo.Tests/Dizimo.Tests.csproj -c Release -v:detailed
          dotnet test Dizimo/tests/Dizimo.Tests/Dizimo.Tests.csproj -c Release --logger "trx;LogFileName=Dizimo.Tests.trx"

      - name: Upload test TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-trx
          path: Dizimo/tests/Dizimo.Tests/TestResults/Dizimo.Tests.trx

  build-android:
    name: Android - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pin SDK to 10.0.100
        run: |
          printf '{"sdk":{"version":"10.0.100"}}' > global.json
          cat global.json
          dotnet --info || true

      - name: Install JDK and Android workload
        run: |
          sudo apt-get update && sudo apt-get install -y openjdk-11-jdk
          dotnet workload install android || true

      - name: Restore (msbuild Restore with TargetFramework)
        run: |
          dotnet msbuild Dizimo/Dizimo.csproj -t:Restore -p:TargetFramework=net10.0-android -verbosity:minimal

      - name: Build Android
        run: dotnet build Dizimo/Dizimo.csproj -f net10.0-android -c Release -v:m

      - name: Publish artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: Dizimo/bin/Release/net10.0-android
