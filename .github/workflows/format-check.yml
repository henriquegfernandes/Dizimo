name: Format Check

on:
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dotnet-format
        run: |
          # Pin to 5.* to avoid NuGet warning about 6.* not being available; 5.x is stable here
          dotnet tool install -g dotnet-format --version 5.* || dotnet tool update -g dotnet-format --version 5.*
          echo "${HOME}/.dotnet/tools" >> $GITHUB_PATH

      - name: Run dotnet format (apply changes)
        run: |
          # Ensure the formatter is installed (pin to 5.x)
          dotnet tool install -g dotnet-format --version 5.* || dotnet tool update -g dotnet-format --version 5.*
          echo "${HOME}/.dotnet/tools" >> $GITHUB_PATH

          # If repository has a global.json that pins SDK to 9.x, move it aside so the installed .NET 10 SDK is used for this job.
          if [ -f global.json ]; then
            echo "Backing up global.json to global.json.ci-bak"
            mv global.json global.json.ci-bak
          fi

          # Show the SDK in use (should be .NET 10 installed by setup-dotnet)
          dotnet --info

          # Restore and format each non-MAUI project individually to avoid evaluating the MAUI Android TFM
          # Exclude the MAUI app project (Dizimo/Dizimo.csproj) which targets net10.0-android and requires workloads.
          mapfile -t projects < <(git ls-files '*.csproj' | grep -v '^Dizimo/Dizimo.csproj$')

          if [ ${#projects[@]} -eq 0 ]; then
            echo "No projects found to restore/format.";
            # restore original global.json if it existed
            if [ -f global.json.ci-bak ]; then mv global.json.ci-bak global.json; fi
            exit 0;
          fi

          format_failed=0
          for p in "${projects[@]}"; do
            echo "Restoring $p (prefer net9.0 framework if available)"
            # Try restoring for net9.0 first (safe for multi-target libs), fallback to plain restore
            if ! dotnet restore "$p" --verbosity minimal --framework net9.0; then
              echo "Fallback: restoring $p without specifying framework"
              dotnet restore "$p" --verbosity minimal || { echo "Restore failed for $p"; # restore original global.json
                if [ -f global.json.ci-bak ]; then mv global.json.ci-bak global.json; fi
                exit 1; }
            fi

            echo "Running dotnet format --verify-no-changes on $p"
            if ! dotnet format "$p" --verify-no-changes; then
              format_failed=1
              echo "Applying formatting to $p"
              dotnet format "$p" || true
            fi
          done

          # restore original global.json if we moved it
          if [ -f global.json.ci-bak ]; then
            mv global.json.ci-bak global.json
          fi

          if [ "$format_failed" -eq 1 ]; then
            echo "One or more projects required formatting changes.";
          fi

      - name: Create diff if formatting changed
        id: create_diff
        run: |
          git status --porcelain
          # Show and save diff if any files changed
          if [ -n "$(git status --porcelain)" ]; then
            git --no-pager diff > format.diff || true
            echo "diff_found=1" >> $GITHUB_OUTPUT
          else
            echo "diff_found=0" >> $GITHUB_OUTPUT
          fi

      - name: Post formatting diff to PR
        if: steps.create_diff.outputs.diff_found == '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('format.diff', 'utf8');
            const body = `Formatting changes required:\n\nPlease run the following locally to apply the formatting changes and push them to your branch:\n\n1. Install the formatter (if not installed):\n\n   dotnet tool install -g dotnet-format --version 6.*\n\n2. Run the formatter at repository root:\n\n   dotnet format\n\n3. Review and commit the changes:\n\n   git add -A\n   git commit -m "style: apply dotnet-format"\n   git push\n\nOnce the changes are pushed the workflow will re-run and the formatting check should pass.\n\n<details><summary>Diff</summary>\n\n```diff\n${diff}\n```\n</details>`;
            const pr = context.issue.number;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr, body });

      - name: Fail if formatting changed
        if: steps.create_diff.outputs.diff_found == '1'
        run: |
          echo "Formatting differs. Please run 'dotnet format' locally and commit the changes.";
          git --no-pager diff --format='%b' || true
          exit 1
