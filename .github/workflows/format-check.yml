name: Format Check

on:
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dotnet-format
        run: |
          dotnet tool install -g dotnet-format --version 6.* || dotnet tool update -g dotnet-format
          echo "${HOME}/.dotnet/tools" >> $GITHUB_PATH

      - name: Run dotnet format verification
        id: format
        run: |
          set -o pipefail
          # Run verification; capture exit code
          dotnet format --verify-no-changes || echo "FORMAT_DIFF=1" >> $GITHUB_ENV

      - name: Collect diff if formatting diverged
        if: env.FORMAT_DIFF == '1'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git --no-pager diff > format.diff || true
          echo "diff-file=format.diff" >> $GITHUB_OUTPUT

      - name: Post formatting diff to PR
        if: env.FORMAT_DIFF == '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('format.diff', 'utf8');
            const body = `Formatting changes required:\n\n<details><summary>Diff</summary>\n\n```diff\n${diff}\n```\n</details>`;
            const pr = context.issue.number;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr, body });
      - name: Fail if formatting diverged
        if: env.FORMAT_DIFF == '1'
        run: |
          echo "Formatting differs. Please run 'dotnet format' locally and commit the changes.";
          exit 1
