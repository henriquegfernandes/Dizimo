name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore Dizimo.sln
      - name: Build
        run: dotnet build Dizimo.sln --no-restore --configuration Release
      - name: Run tests
        run: dotnet test tests/Dizimo.Tests/Dizimo.Tests.csproj --no-build --verbosity normal
